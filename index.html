<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academia Élite | Plantel Normal</title>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Framer Motion for Animations -->
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #09090b; /* Zinc 950 */
            color: #f4f4f5; /* Zinc 100 */
            overflow-x: hidden;
        }
        h1, h2, h3, h4, .serif {
            font-family: 'Playfair Display', serif;
        }
        /* Gold Gradient Text Utility */
        .text-gold-gradient {
            background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .bg-gold-gradient {
            background: linear-gradient(to right, #bf953f, #d4af37, #aa771c);
        }
        .gold-border {
            border-image: linear-gradient(to right, #bf953f, #fcf6ba, #aa771c) 1;
        }
        
        /* Smooth Scrolling */
        html {
            scroll-behavior: smooth;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #18181b; 
        }
        ::-webkit-scrollbar-thumb {
            background: #ca8a04; 
            border-radius: 4px;
        }
        
        /* Text Selection */
        ::selection {
            background: #ca8a04;
            color: #000;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const { motion, AnimatePresence, useScroll, useTransform, useInView } = window.Motion;

        // --- Variants for Animations ---
        const fadeInUp = {
            hidden: { opacity: 0, y: 40 },
            visible: { opacity: 1, y: 0, transition: { duration: 0.8, ease: "easeOut" } }
        };

        const staggerContainer = {
            hidden: { opacity: 0 },
            visible: {
                opacity: 1,
                transition: {
                    staggerChildren: 0.2,
                    delayChildren: 0.1
                }
            }
        };

        const scaleIn = {
            hidden: { opacity: 0, scale: 0.8 },
            visible: { opacity: 1, scale: 1, transition: { duration: 0.6 } }
        };

        const slideInLeft = {
            hidden: { opacity: 0, x: -50 },
            visible: { opacity: 1, x: 0, transition: { duration: 0.8, ease: "easeOut" } }
        };

        // --- Icons (Inline SVGs) ---
        const Icon = ({ children, size = 24, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>{children}</svg>
        );

        const Menu = (props) => <Icon {...props}><line x1="4" x2="20" y1="12" y2="12"/><line x1="4" x2="20" y1="6" y2="6"/><line x1="4" x2="20" y1="18" y2="18"/></Icon>;
        const X = (props) => <Icon {...props}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Icon>;
        const CheckCircle = (props) => <Icon {...props}><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><path d="m9 11 3 3L22 4"/></Icon>;
        const ChevronDown = (props) => <Icon {...props}><path d="m6 9 6 6 6-6"/></Icon>;
        const MapPin = (props) => <Icon {...props}><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/></Icon>;
        const Phone = (props) => <Icon {...props}><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></Icon>;
        const BookOpen = (props) => <Icon {...props}><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></Icon>;
        const Instagram = (props) => <Icon {...props}><rect width="20" height="20" x="2" y="2" rx="5" ry="5"/><path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/><line x1="17.5" x2="17.51" y1="6.5" y2="6.5"/></Icon>;
        const Facebook = (props) => <Icon {...props}><path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z"/></Icon>;
        const QrCode = (props) => <Icon {...props}><rect width="5" height="5" x="3" y="3" rx="1"/><rect width="5" height="5" x="16" y="3" rx="1"/><rect width="5" height="5" x="3" y="16" rx="1"/><path d="M21 16h-3a2 2 0 0 0-2 2v3"/><path d="M21 21v.01"/><path d="M12 7v3a2 2 0 0 1-2 2H7"/><path d="M3 12h.01"/><path d="M12 3h.01"/><path d="M12 16v.01"/><path d="M16 12h1"/><path d="M21 12v.01"/><path d="M12 21v-1"/></Icon>;
        const Star = (props) => <Icon {...props}><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></Icon>;
        const Send = (props) => <Icon {...props}><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></Icon>;

        // --- Data ---
        const courses = [
            {
                id: 1,
                title: "Estilismo Profesional",
                duration: "2 Años",
                image: "https://images.unsplash.com/photo-1562322140-8baeececf3df?q=80&w=800&auto=format&fit=crop",
                desc: "Domina el arte del cabello, desde cortes geométricos hasta colorimetría avanzada.",
                modules: ["Diseño de Imagen", "Corte Unisex", "Colorimetría", "Peinado Fantasía", "Tratamientos"]
            },
            {
                id: 2,
                title: "Maquillaje Social",
                duration: "1 Año",
                image: "https://images.unsplash.com/photo-1487412947132-26c244971054?q=80&w=800&auto=format&fit=crop",
                desc: "Experto del pincel para eventos, novias y efectos especiales.",
                modules: ["Skincare", "Novias y XV", "Contouring", "Editorial", "Caracterización"]
            },
            {
                id: 3,
                title: "Barbería Master",
                duration: "8 Meses",
                image: "https://images.unsplash.com/photo-1503951914875-befbb7470d03?q=80&w=800&auto=format&fit=crop",
                desc: "Técnicas clásicas y tendencias urbanas para el cuidado masculino.",
                modules: ["Navaja y Tijera", "Fades", "Ritual de Barba", "Greca Freestyle", "Administración"]
            }
        ];

        const services = [
            { name: "Corte Dama/Caballero", price: "$50" },
            { name: "Tinte Completo", price: "$250" },
            { name: "Efectos de Color", price: "$450" },
            { name: "Maquillaje Social", price: "$150" },
            { name: "Manicure Spa", price: "$80" },
        ];

        // --- Helper Components ---

        const SectionTitle = ({ title, subtitle, align = "center" }) => {
            return (
                <div className={`text-${align} mb-16`}>
                    <motion.div
                        initial={{ opacity: 0, y: 20 }}
                        whileInView={{ opacity: 1, y: 0 }}
                        viewport={{ once: true }}
                        transition={{ duration: 0.6 }}
                    >
                        <h2 className="text-4xl md:text-5xl font-bold text-white mb-4">
                            {title.split(" ").map((word, i) => (
                                <span key={i} className={i % 2 !== 0 ? "text-gold-gradient serif italic" : ""}>{word} </span>
                            ))}
                        </h2>
                        <div className={`h-1 w-24 bg-yellow-600 mt-4 rounded-full ${align === "center" ? "mx-auto" : ""}`}></div>
                    </motion.div>
                    {subtitle && (
                        <motion.p 
                            initial={{ opacity: 0 }} 
                            whileInView={{ opacity: 1 }}
                            viewport={{ once: true }}
                            transition={{ delay: 0.3 }}
                            className="text-zinc-400 max-w-2xl mx-auto mt-4"
                        >
                            {subtitle}
                        </motion.p>
                    )}
                </div>
            );
        };

        const EnrollmentModal = ({ isOpen, onClose }) => {
            const [formData, setFormData] = useState({ name: '', phone: '', course: 'Estilismo Profesional' });

            const handleSubmit = (e) => {
                e.preventDefault();
                const subject = `Solicitud de Inscripción - ${formData.name}`;
                const body = `Hola Academia Élite,\n\nEstoy interesado en inscribirme. Mis datos son:\n\nNombre: ${formData.name}\nTeléfono: ${formData.phone}\nCurso de Interés: ${formData.course}\n\nEspero su respuesta para concretar mi inscripción.\nGracias.`;
                
                window.location.href = `mailto:info@academiaelite.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
                onClose();
            };

            return (
                <AnimatePresence>
                    {isOpen && (
                        <>
                            <motion.div 
                                initial={{ opacity: 0 }} animate={{ opacity: 1 }} exit={{ opacity: 0 }}
                                onClick={onClose}
                                className="fixed inset-0 bg-black/80 backdrop-blur-sm z-[60]"
                            />
                            <motion.div 
                                initial={{ opacity: 0, scale: 0.9, y: 20 }}
                                animate={{ opacity: 1, scale: 1, y: 0 }}
                                exit={{ opacity: 0, scale: 0.9, y: 20 }}
                                className="fixed inset-0 flex items-center justify-center z-[70] p-4 pointer-events-none"
                            >
                                <div className="bg-zinc-900 border border-yellow-600/30 w-full max-w-md p-8 rounded-sm shadow-2xl pointer-events-auto relative">
                                    <button onClick={onClose} className="absolute top-4 right-4 text-zinc-400 hover:text-white">
                                        <X size={24} />
                                    </button>
                                    
                                    <h3 className="text-2xl font-serif text-white mb-2">Inscripción en Línea</h3>
                                    <p className="text-zinc-400 text-sm mb-6">Completa tus datos y se redactará un correo automáticamente.</p>
                                    
                                    <form onSubmit={handleSubmit} className="space-y-4">
                                        <div>
                                            <label className="block text-xs uppercase tracking-widest text-zinc-500 mb-1">Nombre Completo</label>
                                            <input 
                                                type="text" 
                                                required
                                                className="w-full bg-zinc-800 border border-zinc-700 text-white p-3 focus:outline-none focus:border-yellow-500 transition-colors rounded-sm"
                                                placeholder="Ej. Ana Pérez"
                                                onChange={e => setFormData({...formData, name: e.target.value})}
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs uppercase tracking-widest text-zinc-500 mb-1">Teléfono / WhatsApp</label>
                                            <input 
                                                type="tel" 
                                                required
                                                className="w-full bg-zinc-800 border border-zinc-700 text-white p-3 focus:outline-none focus:border-yellow-500 transition-colors rounded-sm"
                                                placeholder="Ej. 55 1234 5678"
                                                onChange={e => setFormData({...formData, phone: e.target.value})}
                                            />
                                        </div>
                                        <div>
                                            <label className="block text-xs uppercase tracking-widest text-zinc-500 mb-1">Curso de Interés</label>
                                            <select 
                                                className="w-full bg-zinc-800 border border-zinc-700 text-white p-3 focus:outline-none focus:border-yellow-500 transition-colors rounded-sm appearance-none"
                                                onChange={e => setFormData({...formData, course: e.target.value})}
                                            >
                                                {courses.map(c => <option key={c.id} value={c.title}>{c.title}</option>)}
                                            </select>
                                        </div>
                                        
                                        <button type="submit" className="w-full bg-gold-gradient text-black font-bold uppercase tracking-widest py-4 mt-4 hover:opacity-90 transition-opacity rounded-sm flex items-center justify-center gap-2">
                                            <Send size={18} /> Enviar Solicitud
                                        </button>
                                    </form>
                                </div>
                            </motion.div>
                        </>
                    )}
                </AnimatePresence>
            );
        };

        // --- Sections ---

        const Navbar = ({ onRegister }) => {
            const [isOpen, setIsOpen] = useState(false);
            const [scrolled, setScrolled] = useState(false);

            useEffect(() => {
                const handleScroll = () => setScrolled(window.scrollY > 50);
                window.addEventListener('scroll', handleScroll);
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);

            const navLinks = [
                { name: "Nosotros", href: "#nosotros" },
                { name: "Carreras", href: "#carreras" },
                { name: "Servicios", href: "#servicios" },
                { name: "Ubicación", href: "#ubicacion" },
            ];

            return (
                <nav className={`fixed w-full z-40 transition-all duration-500 ${scrolled ? 'bg-black/80 backdrop-blur-lg py-3 shadow-2xl border-b border-white/5' : 'bg-transparent py-6'}`}>
                    <div className="container mx-auto px-6 flex justify-between items-center">
                        <motion.div 
                            initial={{ opacity: 0, x: -20 }}
                            animate={{ opacity: 1, x: 0 }}
                            transition={{ duration: 0.8 }}
                            className="flex flex-col cursor-pointer"
                        >
                            <span className="serif text-2xl font-bold text-white tracking-widest">ACADEMIA <span className="text-gold-gradient">ÉLITE</span></span>
                            <span className="text-[10px] tracking-[0.3em] text-zinc-400 uppercase">Plantel Normal</span>
                        </motion.div>

                        {/* Desktop Menu */}
                        <div className="hidden md:flex space-x-8 items-center">
                            {navLinks.map((link, i) => (
                                <motion.a 
                                    key={link.name} 
                                    href={link.href}
                                    initial={{ opacity: 0, y: -10 }}
                                    animate={{ opacity: 1, y: 0 }}
                                    transition={{ delay: 0.1 * i, duration: 0.5 }}
                                    className="text-sm uppercase tracking-wider text-zinc-300 hover:text-yellow-400 transition-colors relative group"
                                >
                                    {link.name}
                                    <span className="absolute -bottom-1 left-0 w-0 h-0.5 bg-yellow-500 transition-all duration-300 group-hover:w-full"></span>
                                </motion.a>
                            ))}
                            <motion.button 
                                onClick={onRegister}
                                initial={{ opacity: 0, scale: 0.8 }}
                                animate={{ opacity: 1, scale: 1 }}
                                whileHover={{ scale: 1.05 }}
                                whileTap={{ scale: 0.95 }}
                                className="bg-white text-black px-6 py-2 text-xs font-bold uppercase tracking-widest hover:bg-yellow-500 transition-colors rounded-sm shadow-[0_0_15px_rgba(255,255,255,0.3)]"
                            >
                                Inscribirme
                            </motion.button>
                        </div>

                        {/* Mobile Toggle */}
                        <button className="md:hidden text-white z-50 relative" onClick={() => setIsOpen(!isOpen)}>
                            {isOpen ? <X /> : <Menu />}
                        </button>
                    </div>

                    {/* Mobile Menu */}
                    <AnimatePresence>
                        {isOpen && (
                            <motion.div 
                                initial={{ opacity: 0, x: '100%' }}
                                animate={{ opacity: 1, x: 0 }}
                                exit={{ opacity: 0, x: '100%' }}
                                transition={{ type: "spring", stiffness: 100, damping: 20 }}
                                className="fixed inset-0 bg-black z-40 flex items-center justify-center md:hidden"
                            >
                                <div className="flex flex-col space-y-8 text-center">
                                    {navLinks.map((link) => (
                                        <a key={link.name} href={link.href} onClick={() => setIsOpen(false)} className="text-3xl text-zinc-300 font-serif italic hover:text-yellow-500 transition-colors">
                                            {link.name}
                                        </a>
                                    ))}
                                    <button onClick={() => { setIsOpen(false); onRegister(); }} className="text-xl font-bold text-yellow-500 uppercase tracking-widest mt-8">
                                        Inscribirme Ahora
                                    </button>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>
                </nav>
            );
        };

        const Hero = () => {
            return (
                <section className="relative h-screen flex items-center justify-center overflow-hidden">
                    {/* Parallax Background with Zoom Effect */}
                    <div className="absolute inset-0 z-0 overflow-hidden">
                        <motion.img 
                            initial={{ scale: 1 }}
                            animate={{ scale: 1.15 }}
                            transition={{ duration: 20, repeat: Infinity, repeatType: "reverse", ease: "linear" }}
                            src="https://images.unsplash.com/photo-1522337660859-02fbefca4702?q=80&w=2669&auto=format&fit=crop" 
                            alt="Background" 
                            className="w-full h-full object-cover opacity-50"
                        />
                        <div className="absolute inset-0 bg-gradient-to-b from-black/80 via-black/40 to-black"></div>
                    </div>

                    <div className="container mx-auto px-6 relative z-10 text-center">
                        <motion.div
                            initial="hidden"
                            animate="visible"
                            variants={staggerContainer}
                        >
                            <motion.span variants={fadeInUp} className="block text-yellow-500 tracking-[0.4em] text-xs md:text-sm mb-6 uppercase font-bold border border-yellow-500/30 inline-block px-4 py-2 rounded-full bg-black/30 backdrop-blur-sm">
                                La excelencia en belleza
                            </motion.span>
                            
                            <motion.h1 variants={fadeInUp} className="text-5xl md:text-7xl lg:text-8xl font-bold text-white mb-6 leading-tight drop-shadow-2xl">
                                Crea tu <br/> <span className="text-gold-gradient serif italic">Propio Estilo</span>
                            </motion.h1>
                            
                            <motion.p variants={fadeInUp} className="max-w-xl mx-auto text-zinc-200 text-lg mb-12 font-light leading-relaxed">
                                Fórmate como profesional en la academia líder. Instalaciones de primer nivel, prácticas reales y certificación oficial.
                            </motion.p>
                            
                            <motion.div variants={fadeInUp} className="flex flex-col md:flex-row justify-center gap-6">
                                <motion.a 
                                    whileHover={{ scale: 1.05, boxShadow: "0 0 20px rgba(234, 179, 8, 0.4)" }}
                                    whileTap={{ scale: 0.95 }}
                                    href="#carreras" 
                                    className="bg-gold-gradient text-black px-10 py-4 font-bold uppercase tracking-widest rounded-sm shadow-lg"
                                >
                                    Ver Carreras
                                </motion.a>
                                <motion.a 
                                    whileHover={{ scale: 1.05, backgroundColor: "rgba(255,255,255,0.1)" }}
                                    whileTap={{ scale: 0.95 }}
                                    href="https://wa.me/5512345678?text=Hola,%20quisiera%20agendar%20una%20cita%20para%20conocer%20el%20plantel."
                                    target="_blank"
                                    rel="noopener noreferrer"
                                    className="border border-zinc-500 text-white px-10 py-4 font-bold uppercase tracking-widest transition-colors rounded-sm backdrop-blur-sm flex items-center justify-center gap-2"
                                >
                                    Agenda Cita
                                </motion.a>
                            </motion.div>
                        </motion.div>
                    </div>
                </section>
            );
        };

        const About = () => {
            return (
                <section id="nosotros" className="py-32 bg-zinc-950 relative overflow-hidden">
                    {/* Decorative Blob */}
                    <motion.div 
                        animate={{ x: [0, 50, 0], y: [0, 30, 0], opacity: [0.1, 0.2, 0.1] }}
                        transition={{ duration: 10, repeat: Infinity, ease: "easeInOut" }}
                        className="absolute top-20 left-0 w-96 h-96 bg-yellow-600 rounded-full blur-[120px] pointer-events-none"
                    />

                    <div className="container mx-auto px-6 relative z-10">
                        <div className="grid md:grid-cols-2 gap-20 items-center">
                            <motion.div 
                                initial="hidden"
                                whileInView="visible"
                                viewport={{ once: true, margin: "-100px" }}
                                variants={slideInLeft}
                            >
                                <h2 className="text-4xl md:text-6xl font-bold text-white mb-8 leading-tight">
                                    Más que una escuela, <br/>
                                    <span className="serif italic text-gold-gradient">una familia creativa.</span>
                                </h2>
                                <p className="text-zinc-400 mb-8 leading-relaxed text-lg">
                                    En Academia Élite Plantel Normal, llevamos más de 10 años formando a los líderes de la industria de la belleza. Nuestro método educativo combina la teoría rigurosa con la práctica constante en modelos reales.
                                </p>
                                <ul className="space-y-6">
                                    {[
                                        "Certificación con validez oficial",
                                        "Instalaciones modernas y equipadas",
                                        "Bolsa de trabajo garantizada",
                                        "Profesores activos en el medio"
                                    ].map((item, idx) => (
                                        <motion.li 
                                            key={idx} 
                                            initial={{ opacity: 0, x: -20 }}
                                            whileInView={{ opacity: 1, x: 0 }}
                                            transition={{ delay: idx * 0.1 + 0.5 }}
                                            className="flex items-center text-zinc-300 font-medium"
                                        >
                                            <span className="bg-zinc-800 p-2 rounded-full mr-4 text-yellow-500 border border-zinc-700">
                                                <CheckCircle size={16} />
                                            </span>
                                            {item}
                                        </motion.li>
                                    ))}
                                </ul>
                            </motion.div>
                            
                            <motion.div 
                                initial={{ opacity: 0, scale: 0.9, rotate: -2 }}
                                whileInView={{ opacity: 1, scale: 1, rotate: 0 }}
                                viewport={{ once: true }}
                                transition={{ duration: 0.8 }}
                                className="relative group"
                            >
                                <div className="absolute -inset-4 border border-yellow-600/30 rounded-sm z-0 translate-x-4 translate-y-4 group-hover:translate-x-2 group-hover:translate-y-2 transition-transform duration-500"></div>
                                <div className="absolute inset-0 bg-gold-gradient opacity-0 group-hover:opacity-10 transition-opacity duration-500 z-20 mix-blend-overlay"></div>
                                <img 
                                    src="https://images.unsplash.com/photo-1595476108010-b4d1f102b1b1?q=80&w=1000&auto=format&fit=crop" 
                                    alt="Estudiantes trabajando" 
                                    className="relative z-10 w-full h-[600px] object-cover rounded-sm shadow-2xl grayscale group-hover:grayscale-0 transition-all duration-700"
                                />
                            </motion.div>
                        </div>
                    </div>
                </section>
            );
        };

        const CourseCard = ({ course }) => {
            const [isOpen, setIsOpen] = useState(false);

            return (
                <motion.div 
                    variants={fadeInUp}
                    whileHover={{ y: -15 }}
                    className="bg-zinc-900 border border-zinc-800 overflow-hidden group hover:border-yellow-600/50 transition-all duration-500 rounded-sm shadow-lg hover:shadow-yellow-900/20"
                >
                    <div className="relative h-72 overflow-hidden">
                        <img 
                            src={course.image} 
                            alt={course.title} 
                            className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" 
                        />
